<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPM × PM 精通課表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface-2: #F4F1EB;
    --border: #E5E0D6;
    --text-primary: #1A1714;
    --text-secondary: #5C5649;
    --text-muted: #9C9486;
    --accent: #2D6A4F;
    --accent-light: #E8F4EE;
    --accent-border: #B7D8C4;
    --amber: #92540A;
    --amber-light: #FEF3E2;
    --amber-border: #F5C882;
    --purple: #3C3489;
    --purple-light: #EEEDFE;
    --coral: #712B13;
    --coral-light: #FAECE7;
    --blue: #0C447C;
    --blue-light: #E6F1FB;
    --new: #854F0B;
    --new-light: #FAEEDA;
    --red: #991B1B;
    --red-light: #FEF2F2;
    --red-border: #FECACA;
    --radius: 10px;
  }
  body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.6; zoom: 1.44; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 140px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* weakness panel */
  .weakness-panel { background: var(--red-light); border: 1.5px solid var(--red-border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.75rem; }
  .weakness-panel-title { font-size: 14px; font-weight: 700; color: var(--red); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .weakness-tracker-item { background: white; border: 1px solid var(--red-border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .weakness-tracker-item:last-child { margin-bottom: 0; }
  .weakness-tracker-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .weakness-tracker-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .status-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
  .status-improving { background: var(--accent-light); color: var(--accent); }
  .status-ongoing { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }
  .status-new { background: var(--new-light); color: var(--new); }
  .status-resolved { background: #DBEAFE; color: #1E40AF; }
  .weakness-tracker-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
  .weakness-timeline { display: flex; gap: 6px; flex-wrap: wrap; }
  .weakness-day-pill { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: var(--surface-2); color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  .weakness-day-pill.bad { background: var(--red-light); color: var(--red); }
  .weakness-day-pill.good { background: var(--accent-light); color: var(--accent); }
  .weakness-progress-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-style: italic; }

  .summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
  .summary-title { font-size: 13px; font-weight: 600; margin-bottom: 1rem; color: var(--text-secondary); }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .summary-card { background: var(--surface-2); border-radius: 8px; padding: .75rem; text-align: center; }
  .summary-num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .summary-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; }
  .p-tpm { background: var(--purple-light); color: var(--purple); }
  .p-pm  { background: var(--accent-light); color: var(--accent); }
  .p-ai  { background: var(--amber-light); color: var(--amber); }
  .p-push { background: var(--coral-light); color: var(--coral); }
  .p-boss { background: var(--blue-light); color: var(--blue); }
  .p-dk { background: #FEF0EA; color: #993C1D; }
  .p-new { background: var(--new-light); color: var(--new); }
  .week-section { margin-bottom: 1.75rem; }
  .week-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
  .week-desc { font-size: 12px; color: var(--text-secondary); margin-top: 3px; margin-bottom: 10px; }
  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .day-card.is-new { border-left: 3px solid var(--amber); }
  .day-card.is-done { border-color: var(--accent-border); background: #FAFDFB; }
  .day-header { display: flex; align-items: flex-start; gap: 12px; padding: 1rem 1.25rem; cursor: pointer; user-select: none; transition: background .12s; }
  .day-header:hover { background: var(--bg); }
  .day-num { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 48px; padding-top: 3px; flex-shrink: 0; }
  .day-info { flex: 1; }
  .day-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .day-title { font-size: 14px; font-weight: 600; }
  .badge { font-size: 10px; font-weight: 600; border-radius: 4px; padding: 1px 6px; }
  .badge-new { background: var(--new-light); color: var(--new); }
  .badge-done { background: var(--accent-light); color: var(--accent); }
  .day-sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .day-tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .day-chev { font-size: 13px; color: var(--text-muted); flex-shrink: 0; transition: transform .2s; margin-top: 3px; }
  .day-card.open .day-chev { transform: rotate(180deg); }
  .day-body { display: none; border-top: 1px solid var(--border); padding: 1.25rem; }
  .day-card.open .day-body { display: block; }
  .blocks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .block { background: var(--surface-2); border-radius: 8px; padding: .75rem 1rem; }
  .block-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
  .block-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .debrief-box { background: var(--blue-light); border: 1px solid #B5D4F4; border-radius: 8px; padding: .75rem 1rem; margin-bottom: 1rem; }
  .debrief-title { font-size: 12px; font-weight: 600; color: var(--blue); margin-bottom: 6px; }
  .debrief-q { font-size: 12px; color: var(--blue); margin-bottom: 3px; padding-left: 14px; position: relative; }
  .debrief-q::before { content: '→'; position: absolute; left: 0; }
  .deliverable { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--accent); background: var(--accent-light); border: 1px solid var(--accent-border); border-radius: 6px; padding: 4px 10px; margin-bottom: 1.25rem; }
  .retro-section { border-top: 1px solid var(--border); padding-top: 1.25rem; }
  .retro-title { font-size: 13px; font-weight: 600; margin-bottom: 1rem; }
  .retro-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); background: var(--surface-2); border-radius: 6px; padding: 6px 12px; margin-bottom: 1rem; }
  .retro-status.has-data { color: var(--accent); background: var(--accent-light); }
  .rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .rating-label { font-size: 12px; color: var(--text-secondary); }
  .stars { display: flex; gap: 3px; }
  .star { font-size: 20px; color: var(--border); }
  .star.active { color: #F59E0B; }
  .retro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .retro-box { background: var(--surface-2); border-radius: 8px; padding: .75rem 1rem; }
  .retro-box-good { border-left: 3px solid var(--accent); }
  .retro-box-improve { border-left: 3px solid var(--red); background: var(--red-light); }
  .retro-box-next { border-left: 3px solid var(--purple); margin-bottom: 10px; }
  .retro-box-influence { border-left: 3px solid var(--coral); }
  .retro-box-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .retro-box-good .retro-box-label { color: var(--accent); }
  .retro-box-improve .retro-box-label { color: var(--red); }
  .retro-box-next .retro-box-label { color: var(--purple); }
  .retro-box-influence .retro-box-label { color: var(--coral); }
  .retro-content { font-size: 13px; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; }
  .retro-content.is-improve { color: var(--red); font-weight: 500; }
  .retro-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
  .milestone { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: var(--radius); padding: .75rem 1rem; margin-bottom: 8px; font-size: 13px; color: var(--amber); font-weight: 500; }
  /* Toolbox */
  .toolbox { background: var(--surface); border: 1.5px solid var(--purple-light); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.75rem; }
  .toolbox-title { font-size: 14px; font-weight: 700; color: var(--purple); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .tool-card { background: var(--purple-light); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .tool-card:last-child { margin-bottom: 0; }
  .tool-card-title { font-size: 13px; font-weight: 700; color: var(--purple); margin-bottom: .75rem; }
  .tool-step { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .tool-step-num { font-size: 11px; font-weight: 700; color: white; background: var(--purple); border-radius: 4px; padding: 2px 7px; flex-shrink: 0; margin-top: 1px; }
  .tool-step-content { flex: 1; }
  .tool-step-label { font-size: 12px; font-weight: 600; color: var(--purple); margin-bottom: 2px; }
  .tool-step-body { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .tool-formula { background: var(--purple); border-radius: 8px; padding: .75rem 1rem; margin-top: .75rem; font-size: 13px; font-weight: 500; color: white; text-align: center; }
  .tool-example-table { width: 100%; border-collapse: collapse; margin-top: .75rem; font-size: 12px; }
  .tool-example-table th { background: var(--purple); color: white; padding: 6px 10px; text-align: left; font-weight: 600; }
  .tool-example-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text-secondary); vertical-align: top; }
  .tool-example-table tr:last-child td { border-bottom: none; }
  .tool-tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; background: var(--purple); color: white; margin-left: 8px; vertical-align: middle; }
  .checklist-step { background: white; border-radius: 8px; padding: .875rem 1rem; margin-bottom: 8px; border: 1px solid #E5E0FB; }
  .checklist-step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .checklist-step-badge { font-size: 12px; font-weight: 700; color: white; background: var(--purple); border-radius: 6px; padding: 3px 9px; flex-shrink: 0; }
  .checklist-step-title { font-size: 13px; font-weight: 700; color: var(--purple); }
  .checklist-items { list-style: none; padding-left: 4px; }
  .checklist-items li { font-size: 12px; color: var(--text-secondary); padding: 4px 0 4px 24px; position: relative; line-height: 1.5; }
  .checklist-items li::before { content: '☐'; position: absolute; left: 0; color: var(--purple); font-size: 14px; }
  .mantra-bar { display: flex; justify-content: center; gap: 6px; margin: 1rem 0; }
  .mantra-char { background: var(--purple); color: white; font-size: 16px; font-weight: 700; padding: 8px 14px; border-radius: 8px; }
  .decision-q { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; padding: .6rem .9rem; background: var(--surface-2); border-radius: 8px; }
  .scenario-block { background: white; border: 1px solid #E5E0FB; border-radius: 8px; padding: .9rem 1.1rem; margin-bottom: 8px; }
  .scenario-label { display: inline-block; font-size: 11px; font-weight: 700; color: white; background: var(--purple); border-radius: 6px; padding: 3px 10px; margin-bottom: 8px; }
  .scenario-condition { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-style: italic; }
  .scenario-action-label { font-size: 11px; font-weight: 600; color: var(--purple); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .scenario-action-items { list-style: none; padding-left: 4px; }
  .scenario-action-items li { font-size: 12px; color: var(--text-secondary); padding: 3px 0 3px 20px; position: relative; line-height: 1.5; }
  .scenario-action-items li::before { content: '→'; position: absolute; left: 0; color: var(--purple); }
  .scenario-script { background: var(--purple-light); border-radius: 6px; padding: .6rem .8rem; margin-top: 6px; font-size: 12px; color: var(--purple); line-height: 1.6; }

  /* Collapsible weakness items */
  .weakness-tracker-item { cursor: pointer; }
  .weakness-tracker-body { display: none; margin-top: 8px; }
  .weakness-tracker-item.open .weakness-tracker-body { display: block; }
  .weakness-collapse-chev { font-size: 12px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
  .weakness-tracker-item.open .weakness-collapse-chev { transform: rotate(180deg); }

  /* Collapsible tool cards */
  .tool-card { cursor: pointer; }
  .tool-card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .tool-card-body { display: none; margin-top: 10px; }
  .tool-card.open .tool-card-body { display: block; }
  .tool-collapse-chev { font-size: 12px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
  .tool-card.open .tool-collapse-chev { transform: rotate(180deg); }

  /* VP slide reference */
  .vp-slide-card { background: var(--surface-2); border-radius: 12px; border: 0.5px solid var(--border); padding: 1.5rem 1.75rem; margin-top: 1rem; }
  .vp-slide-bottomline { background: var(--accent-light); border-radius: var(--radius); padding: .9rem 1.1rem; margin: .75rem 0 1.1rem; }
  .vp-slide-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.1rem; }
  .vp-slide-stat { background: var(--surface); border-radius: var(--radius); padding: .9rem; text-align: center; }
  .vp-slide-stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .vp-slide-stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .vp-slide-section { margin-bottom: 1rem; }
  .vp-slide-section-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
  .vp-slide-warning { background: var(--amber-light); border-radius: var(--radius); padding: .9rem 1.1rem; margin-bottom: 1rem; }

  @media (max-width: 600px) {
    .main { padding: 1rem 1rem 3rem; }
    .retro-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .weakness-grid { grid-template-columns: 1fr; }
    .header { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>TPM × PM 精通課表</h1>
      <div class="header-sub">Michelle · 美光 Senior Engineer · 每天 4.5 小時</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:34.375%"></div></div>
      <div class="progress-label">11 / 32 完成</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- Toolbox -->
  <div class="toolbox">
    <div class="toolbox-title">🧰 個人工具箱
      <span style="font-size:11px;font-weight:400;color:var(--text-muted)">遇到狀況時，先找對應的顏色區塊</span>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem">
      <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:var(--purple-light);color:var(--purple);border:0.5px solid #C8C3F5">🟣 突發應對</span>
      <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:var(--accent-light);color:var(--accent);border:0.5px solid var(--accent-border)">🟢 影響力</span>
      <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:var(--amber-light);color:var(--amber);border:0.5px solid var(--amber-border)">🟡 需求溝通</span>
      <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:var(--blue-light);color:var(--blue);border:0.5px solid #8DC4EF">🔵 AI 工具</span>
      <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:#FAECE7;color:#993C1D;border:0.5px solid #F0997B">🟠 專案掌握</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem" id="toolbox-grid"></div>

    <div id="toolbox-detail" style="display:none;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-top:.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div id="detail-title" style="font-size:14px;font-weight:600"></div>
        <button onclick="closeDetail()" style="font-size:12px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:4px 8px">✕ 關閉</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>


          <div id="curriculum"></div>
</div>

<script>
const curriculum = [
  {
    week: "Week 1｜建立個人 AI 戰鬥力",
    weekDesc: "先把自己練熟，才能帶別人",
    days: [
      {
        id:"d1", day:"Day 1", isNew:false, done:true,
        title:"回公司第一天：資訊大轟炸",
        sub:"優先順序判斷 + 第一個 AI prompt 框架",
        tags:[["p-tpm","TPM"],["p-ai","AI 技能"]],
        blocks:[
          {label:"早上 2hr｜沉浸情境", body:"同時收到三封緊急訊息，資訊不完整，你要自己問問題挖資料。用 AI 做重要性 × 緊急性矩陣，草擬今天行動清單。"},
          {label:"下午 2hr｜技能拆解", body:"Prompt 基本框架：角色 + 任務 + 背景 + 格式 + 受眾 + 語言。練習五個不同任務各寫一個 prompt。"},
          {label:"Debrief 30min｜影響力反思", body:"今天你做的事，誰是第一個受惠的人？如果要教給別人，你會怎麼設計這個學習過程？"}
        ],
        deliverable:"產出：今日行動清單 + 第一份 prompt 模板",
        retro: {
          rating: 4,
          good: "短時間內建立資訊脈絡、主持跨團隊會議有效率、政治判斷成熟（Ray 的事私下問）、跟 David 溝通有效、prompt 框架四個任務越寫越好",
          improve: "Bottom line 先說的習慣需要刻意練習\n帶人成長的意識需要加強，需要被引導才想到\nPrompt 任務描述不夠清楚，缺少目的和時間點\nPrompt 格式沒有包含所有想要的輸出項目",
          next: "繼續練習 Bottom line 先說、加強把判斷邏輯說出來讓團隊看見",
          influence: "帶動 Kevin + Ray 聚焦在 Theory 1、觸發 Jason 想到借 test chamber 的解法、讓 David 能立刻做決定"
        }
      },
      {
        id:"d2", day:"Day 2", isNew:false, done:true,
        title:"Blocker 升級：風險評估與向上報告",
        sub:"技術風險翻譯成主管聽得懂的語言",
        tags:[["p-tpm","TPM"],["p-boss","主管關卡"],["p-ai","AI 技能"]],

function renderStars(rating) {
  return [1,2,3,4,5].map(i => `<span class="star ${rating>=i?'active':''}">★</span>`).join('');
}

function buildCard(day) {
  const r = day.retro;
  const hasRetro = r && (r.good || r.improve);

  const card = document.createElement('div');
  card.className = 'day-card' + (day.isNew?' is-new':'') + (day.done?' is-done':'');

  const tagHtml = day.tags.map(([cls,label])=>`<span class="pill ${cls}">${label}</span>`).join('');
  const newBadge = day.isNew ? `<span class="badge badge-new">新增</span>` : '';
  const doneBadge = day.done ? `<span class="badge badge-done">✓ 完成</span>` : '';

  const blocksHtml = day.blocks.map(b=>`
    <div class="block">
      <div class="block-label">${b.label}</div>
      <div class="block-body">${b.html !== undefined ? b.html : b.body.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');

  let retroHtml = '';
  if (r) {
    retroHtml = `
      <div class="retro-section">
        <div class="retro-title">每日 Retro 記錄</div>
        <div class="retro-status has-data">已有 Retro 記錄</div>
        <div class="rating-row">
          <span class="rating-label">今天自評</span>
          <div class="stars">${renderStars(r.rating)}</div>
        </div>
        <div class="retro-grid">
          <div class="retro-box retro-box-good">
            <div class="retro-box-label">✅ 做得好的地方</div>
            <div class="retro-content">${r.good}</div>
          </div>
          <div class="retro-box retro-box-improve">
            <div class="retro-box-label">⚠️ 需要改善的地方</div>
            <div class="retro-content is-improve">${r.improve}</div>
          </div>
        </div>
        <div class="retro-box retro-box-next" style="margin-bottom:10px">
          <div class="retro-box-label">🔮 後面課程如何改善</div>
          <div class="retro-content">${r.next}</div>
        </div>
        <div class="retro-box retro-box-influence">
          <div class="retro-box-label">🌊 影響力記錄</div>
          <div class="retro-content">${r.influence}</div>
        </div>
      </div>
    `;
  } else {
    retroHtml = `
      <div class="retro-section">
        <div class="retro-title">每日 Retro 記錄</div>
        <div class="retro-status">尚未完成這天的練習</div>
      </div>
    `;
  }

  card.innerHTML = `
    <div class="day-header">
      <div class="day-num">${day.day}</div>
      <div class="day-info">
        <div class="day-title-row">
          <span class="day-title">${day.title}</span>
          ${newBadge}${doneBadge}
        </div>
        <div class="day-sub">${day.sub}</div>
        <div class="day-tags">${tagHtml}</div>
      </div>
      <div class="day-chev">▾</div>
    </div>
    <div class="day-body">
      <div class="blocks">${blocksHtml}</div>
      <div class="debrief-box">
        <div class="debrief-title">每日影響力三問（Debrief 必問）</div>
        <div class="debrief-q">今天你做的事，誰是第一個受惠的人？</div>
        <div class="debrief-q">這個影響力怎麼擴散出去？</div>
        <div class="debrief-q">如果要教給別人，你會怎麼設計這個學習過程？</div>
      </div>
      <div><span class="deliverable">📦 ${day.deliverable}</span></div>
      ${retroHtml}
    </div>
  `;

  card.querySelector('.day-header').addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('open'));
    if (!isOpen) card.classList.add('open');
  });

  return card;
}

                    <div style="background:#FEF0EA;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9;color:#993C1D">
                      ⚠️ 客製化提示：如果這週沒有 refine 或沒有重大決定，可以跳過更新
                    </div>
                  </div>
                </div>
              </details>

              <details>
                <summary style="font-size:12px;font-weight:600;color:#712B13;cursor:pointer;padding:.6rem .875rem;background:white;border:1px solid #F0997B;border-radius:8px;list-style:none" onclick="event.stopPropagation()">
                  🚪 新 PM 加入，用邏輯地圖幫她快速了解專案
                </summary>
                <div style="background:white;border:1px solid #F0997B;border-radius:0 0 8px 8px;border-top:none;padding:.875rem 1rem;font-size:11px;color:var(--text-secondary)" onclick="event.stopPropagation()">
                  <div style="display:flex;flex-direction:column;gap:6px">
                    <div style="background:#F1EFE8;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9">
                      「這是我維護的專案邏輯地圖，你可以先看一遍，然後我們花 30 分鐘對齊。」→ 特別確認「待確認」欄位 → 趁機重新量化成功定義
                    </div>
                    <div style="background:#FEF0EA;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9;color:#993C1D">
                      ⚠️ 客製化提示：新 PM 的背景決定需要解釋多少技術細節
                    </div>
                  </div>
                </div>
              </details>

              <details>
                <summary style="font-size:12px;font-weight:600;color:#712B13;cursor:pointer;padding:.6rem .875rem;background:white;border:1px solid #F0997B;border-radius:8px;list-style:none" onclick="event.stopPropagation()">
                  📦 邏輯地圖越來越大，難以維護
                </summary>
                <div style="background:white;border:1px solid #F0997B;border-radius:0 0 8px 8px;border-top:none;padding:.875rem 1rem;font-size:11px;color:var(--text-secondary)" onclick="event.stopPropagation()">
                  <div style="background:#FEF0EA;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;margin-bottom:8px;color:#993C1D">
                    基準：邏輯地圖應該讓新加入的人在 15 分鐘內了解現在最重要的事
                  </div>
                  <div style="display:flex;flex-direction:column;gap:6px">
                    <div style="background:#F1EFE8;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9">
                      <strong style="color:#712B13">精簡時機一：功能上線後</strong> → 保留結論，刪掉討論過程
                    </div>
                    <div style="background:#F1EFE8;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9">
                      <strong style="color:#712B13">精簡時機二：假設被驗證後</strong> → 更新狀態，縮短描述
                    </div>
                    <div style="background:#F1EFE8;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9">
                      <strong style="color:#712B13">精簡時機三：方向大改後</strong> → 舊內容移到「歷史記錄」，不要刪
                    </div>
                    <div style="background:#F1EFE8;border:1px solid #F0997B;border-radius:7px;padding:.6rem .875rem;line-height:1.9">
                      <strong style="color:#712B13">用 AI 幫你精簡：</strong><br>「以下是我的邏輯地圖，請幫我判斷哪些可以移到歷史記錄、哪些可以刪掉、哪些必須留著。判斷標準：讓新加入的人在 15 分鐘內了解現在最重要的事。【貼上邏輯地圖】」
                    </div>
                  </div>
                </div>
              </details>

            </div>
          </div>

        </div>
      </div>`
  }
];

const colorMap = {
  purple: { border: '#C8C3F5', bg: '#EEEDFE', text: '#3C3489', hover: '#534AB7' },
  green:  { border: '#B7D8C4', bg: '#E8F4EE', text: '#2D6A4F', hover: '#1D9E75' },
  amber:  { border: '#F5C882', bg: '#FEF3E2', text: '#92540A', hover: '#BA7517' },
  blue:   { border: '#8DC4EF', bg: '#E6F1FB', text: '#0C447C', hover: '#185FA5' },
  coral:  { border: '#F0997B', bg: '#FAECE7', text: '#993C1D', hover: '#D85A30' }
};

function renderToolboxGrid() {
  const grid = document.getElementById('toolbox-grid');
  if (!grid) return;
  grid.innerHTML = tools.map(tool => {
    const c = colorMap[tool.color];
    return `
      <div onclick="openDetail('${tool.id}')"
        style="background:${c.bg};border:0.5px solid ${c.border};border-radius:12px;padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s"
        onmouseenter="this.style.borderColor='${c.hover}';this.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)'"
        onmouseleave="this.style.borderColor='${c.border}';this.style.boxShadow='none'">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:32px;height:32px;border-radius:8px;background:${c.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:18px;line-height:1">${tool.icon}</span>
          </div>
          <span style="font-size:10px;font-weight:500;color:${c.text};background:${c.bg};padding:2px 7px;border-radius:999px;border:0.5px solid ${c.border}">${tool.category}</span>
        </div>
        <div style="font-size:13px;font-weight:500;color:#1A1714;margin-bottom:4px;line-height:1.4">${tool.title}</div>
        <div style="font-size:11px;color:#9C9486;line-height:1.5">${tool.subtitle}</div>
      </div>`;
  }).join('');
}

function openDetail(id) {
  const tool = tools.find(t => t.id === id);
  if (!tool) return;
  const c = colorMap[tool.color];
  document.getElementById('detail-title').innerHTML =
    `<span style="display:inline-flex;align-items:center;gap:8px">
      <span style="font-size:18px;line-height:1">${tool.icon}</span>
      ${tool.title}
    </span>`;
  document.getElementById('detail-content').innerHTML = tool.content;
  const detail = document.getElementById('toolbox-detail');
  detail.style.display = 'block';
  detail.style.borderColor = c.border;
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  document.getElementById('toolbox-detail').style.display = 'none';
}

renderToolboxGrid();

// Collapsible weakness items
// Collapsible weakness items
document.querySelectorAll('.weakness-tracker-item').forEach(item => {
  item.addEventListener('click', () => {
    item.classList.toggle('open');
  });
});

// Collapsible tool cards
document.querySelectorAll('.tool-card').forEach(card => {
  card.addEventListener('click', (e) => {
    card.classList.toggle('open');
  });
});

const container = document.getElementById('curriculum');
curriculum.forEach(week => {
  const section = document.createElement('div');
  section.className = 'week-section';
  section.innerHTML = `<div class="week-title">${week.week}</div><div class="week-desc">${week.weekDesc}</div>`;
  week.days.forEach(day => {
    section.appendChild(buildCard(day));
    if (day.milestone) {
      const m = document.createElement('div');
      m.className = 'milestone';
      m.textContent = '🚩 ' + day.milestone;
      section.appendChild(m);
    }
  });
  container.appendChild(section);
});
</script>
